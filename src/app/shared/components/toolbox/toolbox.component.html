<button [matMenuTriggerFor]="menu" mat-mini-fab aria-label="Añadir lugares" class="add-button">
  <mat-icon>add</mat-icon>
</button>
<mat-menu #menu="matMenu">
  <button mat-menu-item (click)="openSizeDialog(markerIconsPlace.Place)">
    <mat-icon>place</mat-icon>
    <span>Lugares</span>
  </button>
  <button mat-menu-item (click)="openSizeDialog(markerIconsPlace.City)">
    <mat-icon>house</mat-icon>
    <span>Ciudades</span>
  </button>
  <button mat-menu-item (click)="openSizeDialog(markerIconsPlace.Region)">
    <mat-icon>explore</mat-icon>
    <span>Regiones</span>
  </button>
  <button mat-menu-item (click)="openSizeDialog(markerIconsPlace.Continent)">
    <mat-icon>public</mat-icon>
    <span>Continentes</span>
  </button>
</mat-menu>

<button mat-mini-fab aria-label="Abrir Wiki" class="wiki-button" (click)="goToWiki()">
  <mat-icon>menu_book</mat-icon>
</button>

<button mat-mini-fab aria-label="Cerrar sesión" class="logout-button" (click)="logout()">
  <mat-icon>logout</mat-icon>
</button>
