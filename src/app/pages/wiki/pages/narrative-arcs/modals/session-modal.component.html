<div class="session-modal">
  <div class="modal-header">
    <h2>{{ data.session ? 'Editar Partida' : 'Nueva Partida' }}</h2>
    <button mat-icon-button (click)="cancel()" class="close-button">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="modal-content">
    <form [formGroup]="sessionForm">
      <!-- Basic Info -->
      <div class="basic-info">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Título de la Partida</mat-label>
          <input matInput formControlName="title" placeholder="Ej: La batalla del abismo" />
        </mat-form-field>
        
        <mat-form-field appearance="outline">
          <mat-label>Tipo</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let type of sessionTypes" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nivel de Inicio</mat-label>
          <input matInput type="text" formControlName="startLevel" placeholder="Ej: 5, 5-7, +10" />
        </mat-form-field>
      </div>

      <!-- Players Section -->
      <div class="section">
        <div class="section-header">
          <h3>Jugadores</h3>
          <button mat-mini-fab class="gold-fab" type="button" (click)="addPlayer()">
            <mat-icon>add</mat-icon>
          </button>
        </div>

        <div class="players-list" formArrayName="players">
          <div *ngFor="let player of players.controls; let i = index" class="player-item" [formGroupName]="i">
            <div class="player-fields">
              <mat-form-field appearance="outline">
                <mat-label>Nombre</mat-label>
                <input matInput formControlName="name" />
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Personaje</mat-label>
                <input matInput formControlName="character" />
              </mat-form-field>

              <mat-form-field appearance="outline" class="level-field">
                <mat-label>Nivel</mat-label>
                <input matInput type="number" formControlName="level" min="1" />
              </mat-form-field>

              <button mat-icon-button color="warn" type="button" (click)="removePlayer(i)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>

          <div *ngIf="players.length === 0" class="empty-message">
            No hay jugadores añadidos
          </div>
        </div>
      </div>

      <!-- Contents Section -->
      <div class="section">
        <div class="section-header">
          <h3>Contenidos</h3>
          <button mat-mini-fab class="gold-fab" type="button" (click)="addContent()">
            <mat-icon>add</mat-icon>
          </button>
        </div>

        <div class="contents-list" formArrayName="contents">
          <div *ngFor="let content of contents.controls; let i = index" class="content-item" [formGroupName]="i">
            <div class="content-header">
              <h4>Contenido {{ i + 1 }}</h4>
              <button mat-icon-button color="warn" type="button" (click)="removeContent(i)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>

            <mat-form-field appearance="outline">
              <mat-label>Título</mat-label>
              <input matInput formControlName="title" />
            </mat-form-field>

            <div class="editor-field">
              <label>Resumen Inicial</label>
              <angular-editor formControlName="initialSummary" [config]="editorConfig"></angular-editor>
            </div>

            <div class="editor-field">
              <label>Resumen Final</label>
              <angular-editor formControlName="finalSummary" [config]="editorConfig"></angular-editor>
            </div>
          </div>

          <div *ngIf="contents.length === 0" class="empty-message">
            No hay contenidos añadidos
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-actions">
    <button mat-button (click)="cancel()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="!sessionForm.valid">
      Guardar
    </button>
  </div>
</div>
