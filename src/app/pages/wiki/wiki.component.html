<mat-sidenav-container class="wiki-container">
  <mat-sidenav mode="side" opened class="wiki-sidenav">
    <div class="wiki-header">
      <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
        <button mat-icon-button routerLink="/" class="back-button">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h2>Mythera Wiki</h2>
      </div>
      <button mat-icon-button aria-label="Cerrar sesión" class="logout-button" (click)="logout()" title="Cerrar Sessión">
        <mat-icon>logout</mat-icon>
      </button>
    </div>

    <mat-nav-list>

      <!-- Partidas -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            <mat-icon>campaign</mat-icon>
            <span>Partidas</span>
          </mat-panel-title>
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="/wiki/arcos-narrativos" routerLinkActive="active">
            <mat-icon>auto_stories</mat-icon>
            <span>Arcos Narrativos</span>
          </a>
          <a mat-list-item routerLink="/wiki/linea-temporal" routerLinkActive="active">
            <mat-icon>timeline</mat-icon>
            <span>Línea Temporal</span>
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- Seres Inmortales -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            <mat-icon>auto_awesome</mat-icon>
            <span>Seres Inmortales</span>
          </mat-panel-title>
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="/wiki/dioses" routerLinkActive="active">
            <mat-icon>church</mat-icon>
            <span>Dioses</span>
          </a>
          <a mat-list-item routerLink="/wiki/eternos" routerLinkActive="active">
            <mat-icon>stars</mat-icon>
            <span>Eternos</span>
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- Razas -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            <mat-icon>groups</mat-icon>
            <span routerLink="/wiki/razas" style="cursor: pointer; padding: 4px;">Razas</span>
          </mat-panel-title>
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item *ngFor="let race of races" [routerLink]="['/wiki/razas', race._id]"
            routerLinkActive="active">
            <mat-icon>person</mat-icon>
            <span>{{ race.name }}</span>
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- Personajes -->
      <a mat-list-item routerLink="/wiki/personajes" routerLinkActive="active">
        <mat-icon>face</mat-icon>
        <span>Personajes</span>
      </a>

      <!-- Organizaciones -->
      <a mat-list-item routerLink="/wiki/organizaciones" routerLinkActive="active">
        <mat-icon>corporate_fare</mat-icon>
        <span>Organizaciones</span>
      </a>

      <!-- Normas de la Mesa -->
      <a mat-list-item routerLink="/wiki/normas-mesa" routerLinkActive="active">
        <mat-icon>gavel</mat-icon>
        <span>Normas de la Mesa</span>
      </a>

      <!-- Eventos Históricos -->
      <a mat-list-item routerLink="/wiki/eventos-historicos" routerLinkActive="active">
        <mat-icon>history_edu</mat-icon>
        <span>Eventos Históricos</span>
      </a>

    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="wiki-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
